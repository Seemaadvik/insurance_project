<!DOCTYPE html>
<html>
<head>
    <title>Insurance System</title>
</head>

<body>

<h2>Insurance Dashboard</h2>

<hr>

<!-- ================= REGISTER ================= -->
<h3>Register User</h3>

<input id="regName" placeholder="Name">
<input id="regPassword" placeholder="Password" type="password">

<button onclick="registerUser()">Register</button>

<hr>

<!-- ================= LOGIN ================= -->
<h3>Login</h3>

<input id="loginName" placeholder="Name">
<input id="loginPassword" placeholder="Password" type="password">

<button onclick="loginUser()">Login</button>

<p id="loginStatus"></p>

<hr>

<!-- ================= CREATE ACCOUNT ================= -->
<h3>Create Insurance Account</h3>

<input id="name" placeholder="Name">
<input id="policy" placeholder="Policy Type">
<input id="premium" placeholder="Premium">

<button onclick="createAccount()">Create</button>

<hr>

<!-- ================= SEARCH ================= -->
<h3>Search Account</h3>

<input id="searchId" placeholder="Enter ID">
<button onclick="searchAccount()">Search</button>

<div id="result"></div>

<hr>

<!-- ================= TABLE ================= -->
<h3>Accounts</h3>

<table border="1">
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Policy</th>
            <th>Premium</th>
            <th>Action</th>
        </tr>
    </thead>

    <tbody id="tableData"></tbody>
</table>

<script src="/static/app.js"></script>

</body>
</html>
